name: Flask CI Pipeline

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main      
            
jobs:       
     build-and-test:
        runs-on: ubuntu-latest

        steps:

            - name: Checkout Repository
              uses: actions/checlout@v4
            
            - name: Setup Python
              uses: actions/setup-python@v5

              with:
                python-version: "3.10"

            - name: Install Dependencies
              run: |
                python -m pip install --upgrade pip
                pip -r requirements.txt

            - name: Run Tests
              run: pytest -v

